<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  body, html { 
    margin: 0; 
    padding: 0; 
    background: transparent !important; 
    overflow: hidden; 
  }
  
  .container {
    /* Karta je nyní 1000px široká, aby náhled vynikl */
    width: 1000px; 
    background: white; 
    padding: 40px; 
    border-radius: 30px; 
    box-shadow: 0 20px 60px rgba(0,0,0,0.7); 
    display: flex;
    flex-direction: column;
  }

  /* --- OBŘÍ AVATAR --- */
  img#avatar {
    width: 180px; /* Masivní zvětšení */
    height: 180px; 
    border-radius: 50%; 
    object-fit: cover;
    flex-shrink: 0;
    border: 5px solid #cc0000; /* Červený okraj ladící k YouTube */
  }

  /* --- NÁHLED V PLNÉ ŠÍŘI --- */
  img#thumb {
    width: 100%; 
    height: auto; 
    border-radius: 20px; 
    display: block;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  /* Texty pro TV z dálky */
  .channel-name { font-weight: bold; color: #cc0000; font-size: 3.2em; line-height: 1.1; }
  .time-text { color: #666; font-size: 1.8em; margin-top: 10px; }
  .notif-text { font-weight: bold; color: #0056b3; font-size: 2.5em; margin-bottom: 30px; line-height: 1.3; }
</style>

<div class="container">
    <div style="display: flex; gap: 40px; align-items: center; margin-bottom: 35px;">
        <img id="avatar" src="https://yt3.ggpht.com/fa6uW6MMh0Yx7Kuvv-egS6fF5atRvpL77qq-p9uMVgdPhRS6Rf1-Fmymuu55YaxLtvplP29D=s240-c-k-c0x00ffffff-no-rj">
        <div>
            <div class="channel-name">🔴 Yo Ang</div>
            <div class="time-text">16.10</div>
        </div>
    </div>
    
    <div class="notif-text">LIVE 🔴 Freezing Temps are BACK! How will we survive? 🥶 #NYC #lunarnewyear #2026</div>
    
    <img id="thumb" src="https://i.ytimg.com/vi/UUVVpu4RWQ8/sddefault_live.jpg">
</div>
