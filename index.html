<meta charset="UTF-8">
<style>
  body, html { 
    margin: 0; 
    padding: 0; 
    /* Absolutní průhlednost pozadí - odstraňuje bílou plochu */
    background: transparent !important; 
    overflow: hidden; 
  }
  
  .container {
    width: 750px; /* Trochu jsem zvětšil celou kartu, aby se tam větší obrázky vešly */
    background: white; 
    padding: 25px; /* Více prostoru kolem obsahu */
    border-radius: 20px; /* Výraznější zaoblení */
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); /* Hlubší stín pro lepší vizuál */
    display: flex;
    flex-direction: column;
  }

  /* --- ZVĚTŠENÝ AVATAR --- */
  img#avatar {
    width: 100px; /* Zvětšeno z 80px */
    height: 100px; 
    border-radius: 50%; 
    object-fit: cover;
    flex-shrink: 0;
    border: 3px solid #eee; /* Výraznější okraj */
  }

  /* --- ZVĚTŠENÝ NÁHLED VIDEA --- */
  img#thumb {
    width: 100%; /* Vyplní celou šířku kontejneru */
    height: auto; 
    border-radius: 12px; 
    display: block;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }
</style>

<div class="container">
    <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
        <img id="avatar" src="https://yt3.ggpht.com/ytc/AIdro_krhubnODy21eh-ZZ34y6QxTq6j-OXSZ1HMuGy0hsdIB3k=s240-c-k-c0x00ffffff-no-rj">
        <div>
            <div style="font-weight: bold; color: #cc0000; font-size: 1.8em; line-height: 1.1;">
                %antitle
            </div>
            <div style="color: #666; font-size: 1.2em; margin-top: 5px;">
                14.55
            </div>
        </div>
    </div>
    
    <div style="font-weight: bold; color: #0056b3; font-size: 1.5em; margin-bottom: 20px; line-height: 1.4;">
        %antext
    </div>
    
    <img id="thumb" src="https://i.ytimg.com/vi/Dd187IeVcKs/sddefault_live.jpg">
</div>
